{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="card shadow">

        <div class="card-body p-5">

            <h2 class="mb-5 text-center">
                Converter Analytics
            </h2>

            <div class="row text-center">

                <div class="col-md-6">
                    <div class="border rounded p-4">

                        <h6>
                            Total Users
                        </h6>

                        <h1>
                            {{ total_users }}
                        </h1>

                    </div>
                </div>

                <div class="col-md-6">
                    <div class="border rounded p-4">

                        <h6>
                            Total Conversions
                        </h6>

                        <h1>
                            {{ total_conversions }}
                        </h1>

                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
