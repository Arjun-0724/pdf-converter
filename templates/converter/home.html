{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Universal File Converter</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <span class="navbar-brand fs-4">
          Universal File Converter
        </span>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="card shadow converter-card p-5">

        <h2 class="text-center mb-3">
          Convert Files Easily
        </h2>

        <p class="text-center text-muted">
          Drag and drop a file or browse from your computer.
        </p>

        <!-- Drop Zone -->
        <div id="drop-zone" class="drop-zone mb-4">
          <div class="display-4 mb-2">
            📄
          </div>

          <h5>
            Drag and Drop File Here
          </h5>

          <p class="text-muted mb-0">
            or click to browse
          </p>
        </div>

        <!-- Form -->
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}

          <input
            type="file"
            name="document"
            id="file-input"
            class="form-control"
            hidden
          />

          <p
            id="file-name"
            class="text-center text-muted mb-4"
          >
            No file selected
          </p>

          <div class="row">

            <div class="col-md-6 mb-3">
              <label class="form-label">
                From
              </label>

              <select class="form-select">
                <option>
                  Auto Detect
                </option>
              </select>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">
                To
              </label>

              <select class="form-select">
                <option>
                  PDF
                </option>
              </select>
            </div>

          </div>

          <button
            type="submit"
            class="btn btn-primary w-100"
          >
            Convert File
          </button>

        </form>
      </div>
    </div>

    <script src="{% static 'js/main.js' %}"></script>
  </body>
</html>
