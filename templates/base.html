{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Universal File Converter</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">Universal File Converter</a>

        <div>
          {% if user.is_authenticated %}
            <span class="text-white me-3">Hi, {{ user.username }}</span>

            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
          {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Login</a>

            <a href="{% url 'register' %}" class="btn btn-warning btn-sm">Sign Up</a>
          {% endif %}
        </div>
      </div>
    </nav>
    <div class="container mt-4">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-success">{{ message }}</div>
        {% endfor %}
      {% endif %}

      {% block content %}

      {% endblock %}
    </div>
    <script src="{% static 'js/main.js' %}"></script>
  </body>
</html>
