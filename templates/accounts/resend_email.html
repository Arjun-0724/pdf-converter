{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <h3>Resend Verification Email</h3>

    <form method="POST">
        {% csrf_token %}

        <input type="email"
               name="email"
               class="form-control"
               placeholder="Enter your email"
               required>

        <button class="btn btn-primary mt-3">
            Resend Email
        </button>
    </form>

</div>

{% endblock %}
